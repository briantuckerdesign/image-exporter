<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tests</title>
  </head>
  <body>
    <section>
      <div>
        <!-- Scale -->
        <label for="scale"><strong>Scale</strong></label>
        <select title="scale" ie-scale-input>
          <option value="5">@1x</option>
        </select>
      </div>
      <div>
        <!-- Quality -->
        <label for="quality"><strong>Quality</strong></label>
        <input
          type="range"
          id="quality"
          name="quality"
          min="0.00"
          max="1.00"
          value="0.75"
          step="0.01"
          ie-quality-input
        />
      </div>
      <div>
        <!-- Format -->
        <label for="format"><strong>Format</strong></label>
        <select title="format" ie-format-input>
          <option value="jpg">JPG</option>
        </select>
      </div>
      <div>
        <fieldset>
          <legend><strong>Image label</strong></legend>
          <!-- dateInLabel -->
          <label for="dateInLabel">
            <input
              type="checkbox"
              id="dateInLabel"
              name="dateInLabel"
              name="dateInLabel"
              role="switch"
              checked="checked"
              ie-img-label-date-input
            />
            Date in label
          </label>
          <!--scaleInLabel-->
          <label for="scaleInLabel">
            <input
              type="checkbox"
              id="scaleInLabel"
              name="scaleInLabel"
              name="scaleInLabel"
              role="switch"
              checked="checked"
              ie-img-label-scale-input
            />
            Scale in label
          </label>
        </fieldset>
      </div>
      <fieldset>
        <legend><strong>Zip label</strong></legend>
        <!-- zipLabel -->
        <label for="zipLabel">Label</label>
        <input type="text" id="zipLabel" name="zipLabel" ie-zip-label-input value="ie" />
        <!-- zipDateInLabel -->
        <label for="zipDateInLabel">
          <input
            type="checkbox"
            id="zipDateInLabel"
            name="zipDateInLabel"
            name="zipDateInLabel"
            role="switch"
            checked="checked"
            ie-zip-label-date-input
          />
          Date in label
        </label>
        <!--zipScaleInLabel-->
        <label for="zipScaleInLabel">
          <input
            type="checkbox"
            id="zipScaleInLabel"
            name="zipScaleInLabel"
            name="zipScaleInLabel"
            role="switch"
            checked="checked"
            ie-zip-label-scale-input
          />
          Scale in label
        </label>
      </fieldset>

      <button ie-trigger>Run</button>
    </section>
    <section>
      <div>
        <!-- Scale -->
        <label for="test-scale"><strong>Scale</strong></label>
        <select title="test-scale" test-scale-input>
          <option value="5">@1x</option>
        </select>
      </div>
      <div>
        <!-- Quality -->
        <label for="quality"><strong>Quality</strong></label>
        <input
          type="range"
          id="quality"
          name="quality"
          min="0.00"
          max="1.00"
          value="0.75"
          step="0.01"
          test-quality-input
        />
      </div>
      <div>
        <!-- Format -->
        <label for="format"><strong>Format</strong></label>
        <select title="format" test-format-input>
          <option value="jpg">JPG</option>
        </select>
      </div>
      <div>
        <fieldset>
          <legend><strong>Image label</strong></legend>
          <!-- dateInLabel -->
          <label for="dateInLabel">
            <input
              type="checkbox"
              id="dateInLabel"
              name="dateInLabel"
              name="dateInLabel"
              role="switch"
              checked="checked"
              test-img-label-date-input
            />
            Date in label
          </label>
          <!--scaleInLabel-->
          <label for="scaleInLabel">
            <input
              type="checkbox"
              id="scaleInLabel"
              name="scaleInLabel"
              name="scaleInLabel"
              role="switch"
              checked="checked"
              test-img-label-scale-input
            />
            Scale in label
          </label>
        </fieldset>
      </div>
      <fieldset>
        <legend><strong>Zip label</strong></legend>
        <!-- zipLabel -->
        <label for="zipLabel">Label</label>
        <input
          type="text"
          id="zipLabel"
          name="zipLabel"
          test-zip-label-input
          value="ie"
        />
        <!-- zipDateInLabel -->
        <label for="zipDateInLabel">
          <input
            type="checkbox"
            id="zipDateInLabel"
            name="zipDateInLabel"
            name="zipDateInLabel"
            role="switch"
            checked="checked"
            test-zip-label-date-input
          />
          Date in label
        </label>
        <!--zipScaleInLabel-->
        <label for="zipScaleInLabel">
          <input
            type="checkbox"
            id="zipScaleInLabel"
            name="zipScaleInLabel"
            name="zipScaleInLabel"
            role="switch"
            checked="checked"
            test-zip-label-scale-input
          />
          Scale in label
        </label>
      </fieldset>
    </section>
    <div
      ie="wrapper"
      ie-scale="2"
      ie-quality="0.55"
      ie-format="png"
      ie-img-label-date="false"
      ie-img-label-scale="false"
      ie-zip-label="yay"
      ie-zip-label-date="false"
      ie-zip-label-scale="false"
    ></div>
    <div test="wrapper"></div>
    <script src="../../dist/image-exporter.umd.js"></script>
  </body>
</html>
