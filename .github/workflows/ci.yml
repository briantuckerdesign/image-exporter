# Continuous Integration
#
# Runs on every pull request and on pushes to main, so no change reaches main
# without passing checks. CI gate: lint + format + typecheck + test + build.
name: CI

on:
  # Verify every PR before it can be merged.
  pull_request:
  # Re-verify the result after merge, so main always carries a known-good status.
  push:
    branches: [main]

# If new commits are pushed to the same branch/PR, cancel the older in-progress
# run instead of wasting a runner on stale code.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      # The runner starts empty: first put our code on it.
      - name: Check out the repository
        uses: actions/checkout@v4

      # Bun isn't preinstalled on the runner image, so install it (small/fast).
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # --frozen-lockfile installs EXACTLY what bun.lock pins and fails if the
      # lockfile is out of sync with package.json. Reproducible, deterministic.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      # Runs both environments: test:dom (happy-dom) and test:node (no DOM).
      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
